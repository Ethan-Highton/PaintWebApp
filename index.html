<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paint Calculator</title>
    <link href="css/style.css" rel="stylesheet">
    <script src="script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
 <div class="container">
    <div class="row-sm">
        <img src="Sources/Images/Dulux-Final-Logos-05.jpg" class="rounded mx-auto d-block" alt="Responsive image">
    </div>
    <div class="row-sm">
        <div class="Title">
            <p>Use this calculator to calculate the amount of paint you need for your project!</p> 
        </div>  
    </div>
    <div class="row offset-1 Room-plurality">
        <div class="col offset-2 Single-room">
            <button class="p-3 btn btn-outline-primary">One Room</button> 
        </div>
        <div class="col offset-1 Many-rooms">
            <button class="p-3 btn btn-outline-primary">Multiple Rooms</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
